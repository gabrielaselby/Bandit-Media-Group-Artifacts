<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMG Onboarding Walkthrough</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#efedea;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2.5rem 1.5rem;font-family:'Nunito',sans-serif;color:#252525}
.outer{width:100%;max-width:860px}
.wrap{padding:0}

.hdr{display:flex;align-items:center;gap:14px;margin-bottom:2rem}
.logo{width:44px;height:44px;border-radius:8px;background:#b73030;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-b{color:#fff;font-size:26px;font-weight:800;line-height:1;font-family:'Poppins',sans-serif}
.hdr-main{font-size:20px;font-weight:700;color:#252525;font-family:'Poppins',sans-serif}
.hdr-sub{font-size:13px;color:#6b6760;margin-top:3px}

.phase-nav{display:flex;gap:7px;margin-bottom:1.25rem;flex-wrap:wrap}
.pill{padding:6px 15px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid #ccc;background:#e4e2de;color:#7a7672;cursor:pointer;transition:all .15s;opacity:.3;pointer-events:none;font-family:'Nunito',sans-serif}
.pill.vis{opacity:1;pointer-events:auto}
.pill.on{color:#fff!important;border-color:transparent!important}

.card{border:1px solid #d4d1cc;border-radius:14px;overflow:hidden;background:#fff}
.card-head{padding:16px 24px;border-bottom:1px solid #e8e5e0;display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:#faf9f7}
.badge{font-size:12px;padding:4px 11px;border-radius:20px;font-weight:700;white-space:nowrap;font-family:'Poppins',sans-serif}
.card-title{font-size:17px;font-weight:700;color:#252525;font-family:'Poppins',sans-serif}
.card-when{font-size:13px;color:#6b6760;margin-left:auto;font-style:italic}

.card-body{padding:20px 24px;display:grid;grid-template-columns:minmax(0,3fr) minmax(0,2fr);gap:20px}
@media(max-width:540px){.card-body{grid-template-columns:1fr}}

.sec-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:#9a9690;margin-bottom:13px;font-weight:700;font-family:'Poppins',sans-serif}
.step{display:flex;gap:11px;margin-bottom:11px;align-items:flex-start}
.bul{width:7px;height:7px;border-radius:50%;margin-top:7px;flex-shrink:0}
.stext{font-size:14px;color:#252525;line-height:1.6}

.chk{background:#f5f3f0;border-radius:10px;padding:18px}
.chk-text{font-size:14px;color:#252525;line-height:1.65}

@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ani{animation:fu .22s ease-out}
</style>
</head>
<body>
<div class="outer">
<div class="wrap">

  <div class="hdr">
    <div class="logo"><span class="logo-b">B</span></div>
    <div>
      <div class="hdr-main">Onboarding a New Bandit</div>
      <div class="hdr-sub">Offer accepted to Day 30</div>
    </div>
  </div>

  <svg id="tl" width="100%" viewBox="0 0 680 148" style="display:block;margin-bottom:1.25rem;overflow:visible">
    <path fill="none" stroke="#b73030" stroke-dasharray="6 3" stroke-width="1.5" d="M60,74H620" opacity=".35"/>
    <circle id="tdot" cx="60" cy="74" r="5" fill="#b73030" opacity="0"/>

    <g id="pg0" opacity="0" style="cursor:pointer" onclick="sel(0)">
      <circle id="pd0" cx="60" cy="74" r="9" fill="#5a5550"/>
      <text x="60" y="44" text-anchor="middle" font-size="12" fill="#5a5550" font-weight="600" font-family="Poppins,sans-serif">Phase 1</text>
      <text x="60" y="102" text-anchor="middle" font-size="13" fill="#252525" font-weight="600" font-family="Poppins,sans-serif">Pre-Start</text>
      <text x="60" y="118" text-anchor="middle" font-size="12" fill="#6b6760" font-family="Nunito,sans-serif">Setup</text>
      <circle cx="60" cy="74" r="30" fill="transparent"/>
    </g>

    <g id="pg1" opacity="0" style="cursor:pointer" onclick="sel(1)">
      <circle id="pd1" cx="200" cy="74" r="9" fill="#b73030"/>
      <text x="200" y="44" text-anchor="middle" font-size="12" fill="#b73030" font-weight="600" font-family="Poppins,sans-serif">Phase 2</text>
      <text x="200" y="102" text-anchor="middle" font-size="13" fill="#252525" font-weight="600" font-family="Poppins,sans-serif">Day 1</text>
      <circle cx="200" cy="74" r="30" fill="transparent"/>
    </g>

    <g id="pg2" opacity="0" style="cursor:pointer" onclick="sel(2)">
      <circle id="pd2" cx="340" cy="74" r="9" fill="#b86a1a"/>
      <text x="340" y="44" text-anchor="middle" font-size="12" fill="#b86a1a" font-weight="600" font-family="Poppins,sans-serif">Phase 3</text>
      <text x="340" y="102" text-anchor="middle" font-size="13" fill="#252525" font-weight="600" font-family="Poppins,sans-serif">Week 1</text>
      <circle cx="340" cy="74" r="30" fill="transparent"/>
    </g>

    <g id="pg3" opacity="0" style="cursor:pointer" onclick="sel(3)">
      <circle id="pd3" cx="480" cy="74" r="9" fill="#1e7a52"/>
      <text x="480" y="44" text-anchor="middle" font-size="12" fill="#1e7a52" font-weight="600" font-family="Poppins,sans-serif">2-Week</text>
      <text x="480" y="102" text-anchor="middle" font-size="13" fill="#252525" font-weight="600" font-family="Poppins,sans-serif">Check-In</text>
      <circle cx="480" cy="74" r="30" fill="transparent"/>
    </g>

    <g id="pg4" opacity="0" style="cursor:pointer" onclick="sel(4)">
      <circle id="pd4" cx="620" cy="74" r="9" fill="#1a5a99"/>
      <text x="620" y="44" text-anchor="middle" font-size="12" fill="#1a5a99" font-weight="600" font-family="Poppins,sans-serif">30-Day</text>
      <text x="620" y="102" text-anchor="middle" font-size="13" fill="#252525" font-weight="600" font-family="Poppins,sans-serif">Check-In</text>
      <circle cx="620" cy="74" r="30" fill="transparent"/>
    </g>
  </svg>

  <div class="phase-nav" id="pnav"></div>
  <div class="card" id="dcard"></div>

</div>
</div>

<script>
const PH=[
  {color:'#5a5550',label:'Pre-Start Setup',when:'Before Day 1',
   steps:[
    'Confirm start date, role title, and reporting structure with Rush; resolve any ambiguity before you provision anything',
    'Provision all 7 core tools: Google Workspace, 1Password, WhatsApp, Google Calendar, Slack, ClickUp, Attio',
    'Pull the job description and provision any role-specific tools beyond the core 7',
    'Draft the Slack welcome message; schedule kickoff call (45-60 min), Rush intro (30 min), and 2-week + 30-day check-ins',
    'Identify and have ready: Agency OS link, role-relevant SOPs, and active client briefs for their first two weeks'],
   chk:'All tools provisioned. Every meeting on the calendar. Welcome message drafted. Reference materials identified. Nothing requires the new hire to wait on you after Day 1.'},
  {color:'#b73030',label:'Day 1',when:'Their first day',
   steps:[
    'Run 45-60 min kickoff: verify tool access live, walk through Agency OS, explain BMG comms channels, cover who does what',
    'Confirm they\'re on the 8:15am CST daily standup, starting today or tomorrow',
    'Confirm Rush intro is on the calendar; give them a heads-up it\'s casual',
    'Post Slack welcome message in #general: name, role, brief scope, warm welcome',
    'DM links to Agency OS, role-relevant SOPs, and Week 1 client briefs. Frame it: "Read today and tomorrow, flag anything confusing"'],
   chk:'All tools verified live. Kickoff complete. On standup. Rush intro booked. First reading sent.'},
  {color:'#b86a1a',label:'Week 1',when:'Days 2-5',
   steps:[
    'Let standup handle all team intros; no separate intro calls needed',
    'Coordinate a working session (not a meet-and-greet) between the new hire and their Bandit lead',
    'Assign their first real task in ClickUp: scoped, completable, no hand-holding required',
    'Check in via Slack once or twice: "How\'s it going? Anything blocking you?" Light touch, not a daily review'],
   chk:'New hire is on standup. Working session with lead complete. At least one task logged in ClickUp.'},
  {color:'#1e7a52',label:'2-Week Check-In',when:'End of Week 2',
   steps:[
    'Confirm Rush\'s check-in is on the calendar; this is his call to lead, not yours',
    'Give the new hire a heads-up beforehand: casual conversation, a direct line to Rush early',
    'Goal: surface and address any patterns before they become habits',
    'Collect any notes and action items from the conversation'],
   chk:'Rush check-in complete. Action items logged. Any early patterns addressed before they set in.'},
  {color:'#1a5a99',label:'30-Day Check-In',when:'End of Month 1',
   steps:[
    'Run a 30-min open conversation. Start with: "How are you actually feeling?", "Anything you wish went differently?", "What do you need more of right now?"',
    'Let it go where it needs to; you\'re not filling out a rubric',
    'Write a short summary and share relevant notes with Rush and their Bandit lead',
    'Close out: verify 100% checklist complete, file provisioning notes in Drive, clear remaining onboarding calendar blocks'],
   chk:'Both check-ins done. Notes documented and filed in Drive. Onboarding checklist 100% closed. New Bandit fully operating solo.'}
];

const XS=[60,200,340,480,620];
let revealed=[],active=-1,animStart=null;

const nav=document.getElementById('pnav');
PH.forEach((p,i)=>{
  const b=document.createElement('button');
  b.className='pill';b.id='pl'+i;b.textContent=p.label;
  b.onclick=()=>{ if(revealed.includes(i)) sel(i); };
  nav.appendChild(b);
});

function burst(i){
  const svg=document.getElementById('tl');
  const x=XS[i];const y=74;const color=PH[i].color;
  for(let r=0;r<3;r++){
    const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx',x);c.setAttribute('cy',y);
    c.setAttribute('r',10);c.setAttribute('fill','none');
    c.setAttribute('stroke',color);c.setAttribute('stroke-width','1.5');
    c.setAttribute('stroke-opacity','0');
    svg.insertBefore(c,svg.firstChild);
    const delay=r*90;let s=null;
    (function(circle,d){
      function tick(ts){
        if(!s)s=ts;const el=ts-s-d;
        if(el<0){requestAnimationFrame(tick);return;}
        const p=Math.min(el/650,1);
        const ease=1-Math.pow(1-p,3);
        circle.setAttribute('r',10+ease*36);
        circle.setAttribute('stroke-opacity',(1-p)*0.65);
        if(p<1)requestAnimationFrame(tick);else circle.remove();
      }
      requestAnimationFrame(tick);
    })(c,delay);
  }
  const dot=document.getElementById('pd'+i);let ds=null;
  function pulseDot(ts){
    if(!ds)ds=ts;
    const p=Math.min((ts-ds)/300,1);
    const r=9+(active===i?3:0)*Math.sin(p*Math.PI);
    dot.setAttribute('r',Math.round(r*10)/10);
    if(p<1)requestAnimationFrame(pulseDot);
    else dot.setAttribute('r',active===i?11:9);
  }
  requestAnimationFrame(pulseDot);
}

function reveal(i){
  if(revealed.includes(i))return;
  revealed.push(i);
  const g=document.getElementById('pg'+i);
  g.style.transition='opacity .3s';g.setAttribute('opacity','1');
  burst(i);
  document.getElementById('pl'+i).classList.add('vis');
  if(i===0&&active===-1)sel(0);
}

function sel(i){
  if(!revealed.includes(i))return;
  active=i;const p=PH[i];burst(i);
  PH.forEach((_,j)=>{
    const pl=document.getElementById('pl'+j);
    const pd=document.getElementById('pd'+j);
    if(j===i){
      pl.classList.add('on');pl.style.background=p.color;pl.style.color='#fff';
      pd.setAttribute('r','11');
    } else {
      pl.classList.remove('on');pl.style.background='';pl.style.color='';
      pd.setAttribute('r','9');
    }
  });
  render(i);
}

function render(i){
  const p=PH[i];
  const steps=p.steps.map(s=>`<div class="step"><div class="bul" style="background:${p.color}"></div><div class="stext">${s}</div></div>`).join('');
  document.getElementById('dcard').innerHTML=`
    <div class="card-head">
      <span class="badge" style="background:${p.color}22;color:${p.color}">Phase ${i+1}</span>
      <span class="card-title">${p.label}</span>
      <span class="card-when">${p.when}</span>
    </div>
    <div class="card-body ani">
      <div><div class="sec-lbl">Steps</div>${steps}</div>
      <div class="chk">
        <div class="sec-lbl">Phase checkpoint</div>
        <div class="chk-text">${p.chk}</div>
      </div>
    </div>`;
}

const tdot=document.getElementById('tdot');
function easeInOut(t){return t<.5?2*t*t:-1+(4-2*t)*t}

function frame(ts){
  if(!animStart)animStart=ts;
  const t=Math.min((ts-animStart)/3000,1);
  const e=easeInOut(t);
  const cx=60+(620-60)*e;
  tdot.setAttribute('cx',cx);tdot.setAttribute('opacity',t<1?1:0);
  XS.forEach((x,i)=>{ if(cx>=x-2)reveal(i); });
  if(t<1)requestAnimationFrame(frame);else tdot.setAttribute('opacity',0);
}

render(0);
setTimeout(()=>requestAnimationFrame(frame),400);
</script>
</body>
</html>
